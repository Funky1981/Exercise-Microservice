apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: exercise-api-hpa
  namespace: exercise-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exercise-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 min before scaling down
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0     # scale up immediately
      policies:
        - type: Replicas
          value: 2
          periodSeconds: 60
