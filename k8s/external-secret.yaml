# External Secrets Operator — pulls secrets from Azure Key Vault (or any provider)
# Prerequisite: install External Secrets Operator (https://external-secrets.io)
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets-operator --create-namespace
#
# Prerequisite: create a ClusterSecretStore pointing to your vault — see:
#   k8s/cluster-secret-store.yaml.example
#
# Once applied, the operator creates the k8s Secret referenced by deployment.yaml
# and rotates it automatically based on refreshInterval.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: exercise-api-secrets
  namespace: exercise-prod            # change to exercise-staging for staging env
spec:
  refreshInterval: 1h                 # re-sync from vault every hour
  secretStoreRef:
    name: azure-keyvault-store        # ← name of your ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: exercise-api-secrets        # name of the k8s Secret to create/update
    creationPolicy: Owner             # delete the k8s Secret when this resource is deleted
  data:
    - secretKey: ConnectionStrings__DefaultConnection
      remoteRef:
        key: exercise-db-connection-string    # Azure Key Vault secret name

    - secretKey: JwtSettings__Key
      remoteRef:
        key: exercise-jwt-key

    - secretKey: JwtSettings__Issuer
      remoteRef:
        key: exercise-jwt-issuer

    - secretKey: JwtSettings__Audience
      remoteRef:
        key: exercise-jwt-audience

    - secretKey: RapidApi__Key
      remoteRef:
        key: exercise-rapidapi-key
