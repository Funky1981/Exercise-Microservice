# Secret template for Exercise Microservice.
# DO NOT commit real values — populate via kubectl or a secrets manager (e.g., Azure Key Vault CSI, External Secrets Operator).
#
# Secrets rotation:
#   1. Generate new value (e.g., openssl rand -base64 32 for JWT_KEY)
#   2. kubectl create secret generic exercise-api-secrets --from-literal=JWT_KEY=<new> --dry-run=client -o yaml | kubectl apply -f -
#   3. kubectl rollout restart deployment/exercise-api
#   4. After verifying health, revoke the old secret from the issuing system.
#
apiVersion: v1
kind: Secret
metadata:
  name: exercise-api-secrets
  namespace: default
type: Opaque
stringData:
  DB_SA_PASSWORD: "REPLACE_ME"
  JWT_KEY: "REPLACE_ME"
  RAPID_API_KEY: "REPLACE_ME"
  ConnectionStrings__DefaultConnection: "Server=sqlserver-service,1433;Database=ExerciseDb;User Id=sa;Password=REPLACE_ME;TrustServerCertificate=True"
