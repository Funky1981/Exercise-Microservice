# Secret template for Exercise Microservice.
# DO NOT commit real values — populate via kubectl or a secrets manager (e.g., Azure Key Vault CSI, External Secrets Operator).
#
# Secrets rotation:
#   1. Generate new value (e.g., openssl rand -base64 32 for JWT_KEY)
#   2. kubectl create secret generic exercise-api-secrets --from-literal=JWT_KEY=<new> --dry-run=client -o yaml | kubectl apply -f -
#   3. kubectl rollout restart deployment/exercise-api
#   4. After verifying health, revoke the old secret from the issuing system.
#
apiVersion: v1
kind: Secret
metadata:
  name: exercise-api-secrets
  namespace: exercise-prod
type: Opaque
# Prefer External Secrets Operator (k8s/external-secret.yaml) in production so that
# values are pulled directly from your vault without ever being written to Git.
# This file is a last-resort fallback when ESO is not available.
stringData:
  JWT_KEY: "REPLACE_ME"                              # openssl rand -base64 32
  RAPID_API_KEY: "REPLACE_ME"
  # Point at your managed SQL Server — NOT the sqlserver K8s pod.
  ConnectionStrings__DefaultConnection: "Server=<managed-db-host>,1433;Database=ExerciseDb;User Id=<user>;Password=REPLACE_ME;TrustServerCertificate=False;Encrypt=True"
