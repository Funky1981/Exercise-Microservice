services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: exercise_sqlserver
    environment:
      SA_PASSWORD: ${DB_SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P '${DB_SA_PASSWORD}' -Q 'SELECT 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Exercise.API/Dockerfile
    container_name: exercise_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ExerciseDb;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "ExerciseMicroservice"
      Jwt__Audience: "ExerciseMicroserviceUsers"
      Jwt__ExpiryDays: "7"
      RapidApi__Host: "exercisedb.p.rapidapi.com"
      RapidApi__Key: "${RAPID_API_KEY}"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:
    driver: local
